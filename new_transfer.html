<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Transfer - Real Estate Management System</title>
    <link rel="stylesheet" href="style.css?v=1.7">
</head>
<body>
    <div class="main-content">
        <h1>New Transfer</h1>
        <form id="new-transfer-form">
            <div class="form-group">
                <label for="datetime">Date and Time:</label>
                <input type="datetime-local" id="datetime" name="datetime" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="mclr-no">MCLR No.:</label>
                    <input type="text" id="mclr-no" name="mclr-no" required>
                </div>
                <div class="form-group">
                    <label for="plot-no">Plot No (optional):</label>
                    <input type="text" id="plot-no" name="plot-no">
                </div>
                <div class="form-group">
                    <label for="block">Block (optional):</label>
                    <input type="text" id="block" name="block">
                </div>
                 <div class="form-group">
                    <label for="size">Size:</label>
                    <input type="text" id="size" name="size" required>
                </div>
            </div>

            <div class="form-group">
                <label for="file-category">File Category:</label>
                <select id="file-category" name="file-category">
                    <option value="regular">Regular</option>
                    <option value="full-paid">Full Paid</option>
                </select>
            </div>

            <div class="seller-info">
                <h2>Seller Information</h2>
                <div class="form-group">
                    <label for="seller-mc-no">MC No:</label>
                    <input type="text" id="seller-mc-no" name="seller-mc-no">
                </div>
                <div class="form-group">
                    <label for="seller-name">Name:</label>
                    <input type="text" id="seller-name" name="seller-name" required>
                </div>
                <div class="form-group">
                    <label for="seller-guardian">Son/Wife/Daughter of:</label>
                    <input type="text" id="seller-guardian" name="seller-guardian" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="seller-cnic">CNIC:</label>
                        <input type="text" id="seller-cnic" name="seller-cnic" required>
                    </div>
                    <div class="form-group">
                        <label for="seller-contact">Contact No:</label>
                        <input type="text" id="seller-contact" name="seller-contact" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="ndc">NDC:</label>
                        <select id="ndc" name="ndc">
                            <option value="paid">Paid</option>
                            <option value="unpaid">Unpaid</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="gain-tax">Gain Tax:</label>
                        <select id="gain-tax" name="gain-tax">
                            <option value="paid">Paid</option>
                            <option value="unpaid">Unpaid</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="form-7e">Form 7E:</label>
                        <select id="form-7e" name="form-7e">
                            <option value="paid">Paid</option>
                            <option value="unpaid">Unpaid</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="excise-noc">Excise NOC:</label>
                        <select id="excise-noc" name="excise-noc">
                            <option value="issued">Issued</option>
                            <option value="not-issued">Not Issued</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="buyer-info">
                <h2>Buyer Information</h2>
                <div class="form-group">
                    <label for="buyer-mc-no">MC No:</label>
                    <input type="text" id="buyer-mc-no" name="buyer-mc-no">
                </div>
                <div class="form-group">
                    <label for="buyer-name">Name:</label>
                    <input type="text" id="buyer-name" name="buyer-name" required>
                </div>
                <div class="form-group">
                    <label for="buyer-guardian">Son/Wife/Daughter of:</label>
                    <input type="text" id="buyer-guardian" name="buyer-guardian" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="buyer-cnic">CNIC:</label>
                        <input type="text" id="buyer-cnic" name="buyer-cnic" required>
                    </div>
                    <div class="form-group">
                        <label for="buyer-contact">Contact No:</label>
                        <input type="text" id="buyer-contact" name="buyer-contact" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="transfer-fee">Transfer fee:</label>
                        <select id="transfer-fee" name="transfer-fee">
                            <option value="paid">Paid</option>
                            <option value="unpaid">Unpaid</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="fbr-tax">FBR TAX 236-K:</label>
                        <select id="fbr-tax" name="fbr-tax">
                            <option value="paid">Paid</option>
                            <option value="unpaid">Unpaid</option>
                        </select>
                    </div>
                     <div class="form-group">
                        <label for="stamp-duty">Stamp Duty:</label>
                        <select id="stamp-duty" name="stamp-duty">
                            <option value="paid">Paid</option>
                            <option value="unpaid">Unpaid</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="tma-fee">TMA fee:</label>
                        <select id="tma-fee" name="tma-fee">
                            <option value="paid">Paid</option>
                            <option value="unpaid">Unpaid</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="submit-container">
                <button type="submit">Send for processing department</button>
            </div>
        </form>
    </div>
    <script>
        document.getElementById('datetime').value = new Date().toISOString().slice(0, 16);
    </script>
</body>
</html>
